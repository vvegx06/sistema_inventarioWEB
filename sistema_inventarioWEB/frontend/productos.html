<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Productos</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/estilos.css" />
  </head>

  <body>
    <nav class="navbar navbar-dark bg-dark px-3">
      <span class="navbar-brand mb-0 h1">
        <i class="bi bi-box-seam"></i>
        Sistema Inventario
      </span>
    </nav>

    <div class="container-fluid">
      <div class="row">
        <div class="col-md-2 sidebar">
          <ul class="nav flex-column">
            <li class="nav-item">
              <a class="nav-link" href="index.html">
                <i class="bi bi-house"></i> Página Principal
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link active" href="productos.html">
                <i class="bi bi-box"></i> Productos
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="inventario.html">
                <i class="bi bi-archive"></i> Inventario
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="clientes.html">
                <i class="bi bi-people"></i> Clientes
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="proveedores.html">
                <i class="bi bi-truck"></i> Proveedores
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="empleados.html">
                <i class="bi bi-person-badge"></i> Empleados
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="compras.html">
                <i class="bi bi-cart-plus"></i> Compras
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="ventas.html">
                <i class="bi bi-cash"></i> Ventas
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="sucursales.html">
                <i class="bi bi-building"></i> Sucursales
              </a>
            </li>
          </ul>
        </div>

        <div class="col-md-10 contenido">
          <div class="d-flex justify-content-between align-items-center mt-4">
            <h2><i class="bi bi-box"></i> Gestión de Productos</h2>

            <button
              class="btn btn-primary"
              data-bs-toggle="modal"
              data-bs-target="#modalProducto"
            >
              <i class="bi bi-plus-circle"></i> Nuevo Producto
            </button>
          </div>

          <div class="card mt-4">
            <div class="card-body">
              <div class="row">
                <div class="col-md-4">
                  <input
                    type="text"
                    id="buscadorProducto"
                    class="form-control"
                    placeholder="Buscar producto..."
                  />
                </div>
              </div>
            </div>
          </div>

          <div class="card mt-4">
            <div class="card-body">
              <table class="table table-hover">
                <thead class="table-dark">
                  <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Costo</th>
                    <th>Estado</th>
                    <th>Marca</th>
                    <th>Acciones</th>
                  </tr>
                </thead>

                <tbody id="tabla-productos">
                  <tr>
                    <td colspan="6">Cargando productos...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="modalProducto" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <form id="formProducto">
            <div class="modal-header">
              <h5 class="modal-title">Nuevo Producto</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
              ></button>
            </div>

            <div class="modal-body">
              <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input
                  type="text"
                  id="nombreProducto"
                  class="form-control"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Costo</label>
                <input
                  type="number"
                  id="costoProducto"
                  class="form-control"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Estado</label>
                <input
                  type="text"
                  id="estadoProducto"
                  class="form-control"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Marca</label>
                <input
                  type="text"
                  id="marcaProducto"
                  class="form-control"
                  required
                />
              </div>
            </div>

            <div class="modal-footer">
              <button type="submit" class="btn btn-success">Guardar</button>
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Cancelar
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/database.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
